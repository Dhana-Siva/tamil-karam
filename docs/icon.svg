<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5dade2"/>
      <stop offset="100%" style="stop-color:#1a4a8a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="230" ry="230" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="18"/>

  <!-- த on the LEFT -->
  <text x="170" y="540"
    font-family="'Noto Sans Tamil','Tamil Sangam MN','InaiMathi',sans-serif"
    font-size="260" font-weight="bold" text-anchor="middle"
    fill="white" opacity="0.95">த</text>

  <!-- Handshake in WHITE (drawn as SVG paths, emoji style) -->
  <g transform="translate(512,490) scale(0.38)" fill="white">
    <!-- Left arm -->
    <rect x="-620" y="-60" width="320" height="90" rx="45"/>
    <!-- Left palm -->
    <ellipse cx="-280" cy="-15" rx="105" ry="90"/>
    <!-- Left thumb up -->
    <ellipse cx="-360" cy="-80" rx="38" ry="70" transform="rotate(-30 -360 -80)"/>
    <!-- Left fingers -->
    <rect x="-320" y="-195" width="52" height="145" rx="26" transform="rotate(8 -294 -195)"/>
    <rect x="-262" y="-205" width="52" height="160" rx="26" transform="rotate(4 -236 -205)"/>
    <rect x="-202" y="-200" width="50" height="150" rx="25" transform="rotate(1 -177 -200)"/>
    <rect x="-148" y="-185" width="44" height="132" rx="22" transform="rotate(-2 -126 -185)"/>
    <!-- Right arm -->
    <rect x="300" y="-60" width="320" height="90" rx="45"/>
    <!-- Right palm -->
    <ellipse cx="280" cy="-15" rx="105" ry="90"/>
    <!-- Right thumb up -->
    <ellipse cx="360" cy="-80" rx="38" ry="70" transform="rotate(30 360 -80)"/>
    <!-- Right fingers (under clasp) -->
    <rect x="270" y="20" width="52" height="132" rx="26" transform="rotate(-8 296 20)"/>
    <rect x="212" y="25" width="52" height="142" rx="26" transform="rotate(-4 238 25)"/>
    <rect x="152" y="22" width="50" height="135" rx="25" transform="rotate(-1 177 22)"/>
    <rect x="104" y="18" width="44" height="120" rx="22" transform="rotate(2 126 18)"/>
    <!-- Centre clasp -->
    <ellipse cx="0" cy="-10" rx="80" ry="68" opacity="0.4"/>
  </g>

  <!-- ழ் on the RIGHT -->
  <text x="854" y="540"
    font-family="'Noto Sans Tamil','Tamil Sangam MN','InaiMathi',sans-serif"
    font-size="260" font-weight="bold" text-anchor="middle"
    fill="white" opacity="0.95">ழ்</text>

  <!-- தமிழ் கரம் at the bottom -->
  <text x="512" y="900"
    font-family="'Noto Sans Tamil','Tamil Sangam MN','InaiMathi',sans-serif"
    font-size="80" font-weight="bold" text-anchor="middle"
    fill="white" opacity="0.85">தமிழ் கரம்</text>

</svg>
