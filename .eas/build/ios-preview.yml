build:
  name: iOS Preview (Ad Hoc)
  steps:
    - eas/checkout
    - eas/install_node_modules
    - eas/configure_ios_credentials
    - id: debug_env
      name: Debug environment
      run: |
        echo "=== PWD: $(pwd) ==="
        echo "=== macOS: $(sw_vers -productVersion) ==="
        echo "=== KEYBOARD secret set: $([ -n "${KEYBOARD_PROVISIONING_PROFILE_B64:-}" ] && echo YES || echo NO) ==="
        echo "=== Secret length: ${#KEYBOARD_PROVISIONING_PROFILE_B64} chars ==="
        echo "=== ls ios/ ==="
        ls ios/
        echo "=== Done ==="
