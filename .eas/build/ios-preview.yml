build:
  name: iOS Preview (Ad Hoc)
  steps:
    - eas/checkout
    - eas/install_node_modules
    - eas/configure_ios_credentials
    - id: prepare_build
      name: Install pods, keyboard profile, and create Gymfile
      run: |
        set -euo pipefail

        # 1. Install CocoaPods dependencies
        echo "=== Installing CocoaPods ==="
        cd ios && pod install --deployment && cd ..
        echo "Pods installed successfully"

        # 2. Install keyboard extension provisioning profile
        echo "=== Installing keyboard extension profile ==="
        PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
        mkdir -p "$PROFILES_DIR"
        echo "$KEYBOARD_PROVISIONING_PROFILE_B64" | base64 -d > "$PROFILES_DIR/TamilKaramKeyboard.mobileprovision"
        echo "Keyboard profile installed"

        # 3. Write Gymfile for Ad Hoc device build (avoid Simulator default)
        echo "=== Creating Gymfile ==="
        printf '%s\n' \
          'workspace("app.xcworkspace")' \
          'scheme("app")' \
          'clean(false)' \
          'export_options({' \
          '  method: "ad-hoc",' \
          '  teamID: "H72SV43N57",' \
          '  compileBitcode: false,' \
          '  uploadBitcode: false' \
          '})' > ios/Gymfile
        echo "Gymfile written:"
        cat ios/Gymfile

    - eas/run_fastlane
    - eas/find_and_upload_build_artifacts
