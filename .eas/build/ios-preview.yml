build:
  name: iOS Preview (Ad Hoc)
  steps:
    - eas/checkout
    - eas/install_node_modules
    - eas/configure_ios_credentials
    - id: build_ios
      name: Install pods, sign, build IPA with xcodebuild
      run: |
        set -e
        PROJECT_ROOT="$(pwd)"
        echo "=== Project root: $PROJECT_ROOT ==="
        echo "=== Xcode: $(xcodebuild -version | head -1) ==="

        # 1. Install CocoaPods
        echo "=== Installing CocoaPods ==="
        cd "$PROJECT_ROOT/ios"
        pod install 2>&1
        cd "$PROJECT_ROOT"
        echo "=== Pods installed ==="

        # 2. Install keyboard extension provisioning profile
        PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
        mkdir -p "$PROFILES_DIR"
        if [ -z "${KEYBOARD_PROVISIONING_PROFILE_B64:-}" ]; then
          echo "ERROR: KEYBOARD_PROVISIONING_PROFILE_B64 not set"; exit 1
        fi
        echo "$KEYBOARD_PROVISIONING_PROFILE_B64" | base64 -d > /tmp/keyboard.mobileprovision
        security cms -D -i /tmp/keyboard.mobileprovision > /tmp/keyboard.plist 2>&1
        KEYBOARD_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/keyboard.plist 2>/dev/null || python3 -c "import plistlib; print(plistlib.load(open('/tmp/keyboard.plist','rb'))['UUID'])" 2>/dev/null)
        if [ -z "$KEYBOARD_UUID" ]; then echo "ERROR: UUID extraction failed"; exit 1; fi
        echo "=== Keyboard UUID: $KEYBOARD_UUID ==="
        cp /tmp/keyboard.mobileprovision "$PROFILES_DIR/$KEYBOARD_UUID.mobileprovision"

        # 3. Patch pbxproj
        PBXPROJ="$PROJECT_ROOT/ios/app.xcodeproj/project.pbxproj"
        sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"Tamil Karam Keyboard AdHoc\";/PROVISIONING_PROFILE_SPECIFIER = \"$KEYBOARD_UUID\";/g" "$PBXPROJ"
        grep "PROVISIONING_PROFILE" "$PBXPROJ" || true

        # 4. Extend keychain timeout
        DEFAULT_KC=$(security default-keychain 2>/dev/null | tr -d '"' | tr -d ' ')
        security set-keychain-settings -t 3600 "$DEFAULT_KC" 2>/dev/null || true
        echo "=== Signing identities ==="
        security find-identity -v -p codesigning 2>&1 || true

        # 5. Archive with xcodebuild
        ARCHIVE_PATH="$PROJECT_ROOT/app.xcarchive"
        echo "=== Archiving with xcodebuild ==="
        xcodebuild \
          -workspace "$PROJECT_ROOT/ios/app.xcworkspace" \
          -scheme app \
          -configuration Release \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          -archivePath "$ARCHIVE_PATH" \
          CODE_SIGN_STYLE=Manual \
          archive \
          2>&1
        echo "=== Archive complete ==="

        # 6. Create ExportOptions.plist (printf avoids heredoc YAML parse issue)
        printf '%s\n' \
          '<?xml version="1.0" encoding="UTF-8"?>' \
          '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
          '<plist version="1.0"><dict>' \
          '<key>method</key><string>ad-hoc</string>' \
          '<key>teamID</key><string>H72SV43N57</string>' \
          '<key>compileBitcode</key><false/>' \
          '<key>uploadBitcode</key><false/>' \
          '</dict></plist>' > /tmp/ExportOptions.plist
        echo "ExportOptions.plist written"

        # 7. Export IPA
        IPA_DIR="$PROJECT_ROOT/ipa_output"
        mkdir -p "$IPA_DIR"
        echo "=== Exporting IPA ==="
        xcodebuild \
          -exportArchive \
          -archivePath "$ARCHIVE_PATH" \
          -exportOptionsPlist /tmp/ExportOptions.plist \
          -exportPath "$IPA_DIR" \
          2>&1
        echo "=== IPA exported to $IPA_DIR ==="
        ls -la "$IPA_DIR/"

    # eas/find_and_upload_build_artifacts removed for testing
