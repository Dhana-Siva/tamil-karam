build:
  name: iOS Preview (Ad Hoc)
  steps:
    - eas/checkout
    - eas/install_node_modules
    - eas/configure_ios_credentials
    - eas/generate_gymfile_from_template
    - id: install_keyboard_profile
      name: Install TamilKaramKeyboard provisioning profile
      run: |
        mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
        echo "$KEYBOARD_PROVISIONING_PROFILE_B64" | base64 -d > "$HOME/Library/MobileDevice/Provisioning Profiles/TamilKaramKeyboard.mobileprovision"
        echo "Keyboard extension profile installed"
    - eas/run_fastlane
    - eas/find_and_upload_build_artifacts
